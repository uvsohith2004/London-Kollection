<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Black background -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Red border -->
  <rect x="30" y="30" width="452" height="452" fill="none" stroke="#FF0000" stroke-width="20"/>
  
  <!-- Large bold red L -->
  <text x="256" y="380" font-size="320" font-weight="900" fill="#FF0000" text-anchor="middle" font-family="Arial, sans-serif">L</text>
  
  <!-- Small "C" underneath -->
  <text x="256" y="450" font-size="40" font-weight="bold" fill="#FF0000" text-anchor="middle" font-family="Arial, sans-serif">LC</text>
</svg>
